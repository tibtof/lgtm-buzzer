<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>LGTM-Buzzer</title>
    <style>
      :root {
        color-scheme: light dark;
        font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
      }
      body {
        margin: 0;
        padding: 14px;
        min-width: 260px;
        max-width: 320px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 14px;
        font-weight: 600;
      }
      .pr {
        margin: 6px 0 12px;
        padding: 8px;
        border-radius: 6px;
        background: rgba(127, 127, 127, 0.1);
        font-family: ui-monospace, Menlo, monospace;
        font-size: 12px;
        word-break: break-all;
      }
      button {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #1158c7;
        background: #1f6feb;
        color: #ffffff;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover:not(:disabled) {
        background: #1158c7;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .empty {
        color: rgba(127, 127, 127, 0.9);
      }
      .options-link {
        display: block;
        margin-top: 10px;
        text-align: center;
        font-size: 12px;
        color: #1f6feb;
        text-decoration: none;
        cursor: pointer;
      }
      .options-link:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div id="popup-root"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
